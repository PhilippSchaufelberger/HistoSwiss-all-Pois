<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HistoSwiss Interaktive Karte</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .poi-popup img {
            max-width: 260px;
            height: auto;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .poi-popup h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
        }
        .poi-popup p {
            margin: 4px 0;
            font-size: 13px;
        }
        .poi-link {
            display: inline-block;
            margin-top: 6px;
            color: #0078A8;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
    // Prüfen ob Leaflet geladen ist
    if (typeof L === 'undefined') {
        document.getElementById('map').innerHTML = '<div style="padding:20px;color:red;">Leaflet konnte nicht geladen werden. Bitte die Konsole prüfen.</div>';
        throw new Error('Leaflet not loaded');
    }

    // Karte initialisieren
    const map = L.map('map').setView([46.8182, 8.2275], 8);

    // Hintergrundkarte
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // GeoJSON laden (relativer Pfad, da Datei im gleichen Verzeichnis)
    const geojsonUrl = 'histoswiss_route_walking.geojson';

    const markersClusterGroup = L.markerClusterGroup({ chunkedLoading: true });

    fetch(geojsonUrl)
        .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            return response.json();
        })
        .then(data => {
            // Linien zeichnen
            const lineLayer = L.geoJSON(data, {
                filter: f => f.geometry.type === 'LineString',
                style: f => ({
                    color: f.properties.stroke || '#0000ff',
                    weight: f.properties['stroke-width'] || 4,
                    opacity: 0.8
                })
            }).addTo(map);

            // Punkte mit Popups
            const pointsLayer = L.geoJSON(data, {
                filter: f => f.geometry.type === 'Point',
                onEachFeature: (f, layer) => {
                    const p = f.properties;
                    let popup = `<div class="poi-popup">`;
                    if (p.image_url) popup += `<img src="${p.image_url}" alt="Bild">`;
                    popup += `<h3>${p.name || 'Unbenannt'}</h3>`;
                    if (p.poi) popup += `<p><strong>Kategorie:</strong> ${p.poi}</p>`;
                    popup += `<p><strong>Distanz zur KFR:</strong> ${p.distanz_kfr || 'keine Angabe'}</p>`;
                    if (p.target_url) popup += `<a class="poi-link" href="${p.target_url}" target="_blank">Zur Quelle →</a>`;
                    popup += `</div>`;
                    layer.bindPopup(popup, { maxWidth: 280 });
                }
            });

            markersClusterGroup.addLayer(pointsLayer);
            map.addLayer(markersClusterGroup);

            // Kartenausschnitt anpassen
            const bounds = lineLayer.getBounds().isValid() ? lineLayer.getBounds() : markersClusterGroup.getBounds();
            if (bounds.isValid()) map.fitBounds(bounds);
        })
        .catch(error => {
            console.error('Fehler:', error);
            document.getElementById('map').innerHTML = `<div style="padding:20px;background:#f8d7da;color:#721c24;">
                <strong>Fehler beim Laden der Karte:</strong> ${error.message}<br>
                Prüfe, ob die Datei <strong>${geojsonUrl}</strong> im selben Ordner liegt.
            </div>`;
        });
</script>
</body>
</html>
