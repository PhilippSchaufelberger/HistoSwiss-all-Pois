<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HistoSwiss Interaktive Karte</title>
    
    <!-- Die korrekten Programm-Pfade (Nicht ändern!) -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <link rel="stylesheet" href="https://cloudflare.com" />
    <link rel="stylesheet" href="https://cloudflare.com" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .poi-popup img {
            max-width: 260px;
            height: auto;
            border-radius: 6px;
            margin-bottom: 8px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .poi-popup h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            color: #111;
        }
        .poi-popup p {
            margin: 4px 0;
            font-size: 13px;
            color: #444;
            line-height: 1.4;
        }
        .poi-link {
            display: inline-block;
            margin-top: 6px;
            color: #0078A8;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .poi-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Die JavaScript-Programmdateien (Nicht ändern!) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // 1. Karte im Canvas-Modus für die 20'000 Punkte vorbereiten
        const map = L.map('map', {
            preferCanvas: true
        }).setView([46.8182, 8.2275], 8);

        // 2. Hintergrundkarte laden
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap-Mitwirkende'
        }).addTo(map);

        // Name der Datendatei aus Ihrem Repository
        const geojsonUrl = 'histoswiss_route_walking.geojson'; 

        // 3. Cluster-Gruppe für hohe Performance aktivieren
        const markersClusterGroup = L.markerClusterGroup({
            chunkedLoading: true
        });

        // 4. Riesiges GeoJSON einlesen
const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
const geojsonUrl = 'https://philippschaufelberger.github.io/HistoSwiss-all-Pois/histoswiss_route_walking.geojson';

fetch(proxyUrl + geojsonUrl)            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP-Fehler ${response.status}: Die Datei "${geojsonUrl}" wurde nicht gefunden.`);
                }
                return response.json();
            })
            .then(data => {
                // Linien zeichnen
                const lineLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        return feature.geometry.type === 'LineString';
                    },
                    style: function(feature) {
                        return {
                            color: feature.properties.stroke || '#0000ff',
                            weight: feature.properties['stroke-width'] || 4,
                            opacity: 0.8
                        };
                    }
                }).addTo(map);

                // Punkte vorbereiten
                const pointsLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        return feature.geometry.type === 'Point';
                    },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        let popupContent = `<div class="poi-popup">`;
                        if (props.image_url) {
                            popupContent += `<img src="${props.image_url}" alt="POI Bild">`;
                        }
                        popupContent += `<h3>${props.name || 'Unbenannter Ort'}</h3>`;
                        if (props.poi) {
                            popupContent += `<p><strong>Kategorie:</strong> ${props.poi}</p>`;
                        }
                        popupContent += `<p><strong>Distanz zur KFR:</strong> ${props.distanz_kfr || 'Keine Angabe'}</p>`;
                        if (props.target_url) {
                            popupContent += `<a class="poi-link" href="${props.target_url}" target="_blank">Zur Quelle (Histopics) →</a>`;
                        }
                        popupContent += `</div>`;
                        layer.bindPopup(popupContent, { maxWidth: 280 });
                    }
                });

                // Punkte in die Cluster einspeisen
                markersClusterGroup.addLayer(pointsLayer);
                map.addLayer(markersClusterGroup);

                // Karte optimal zoomen
                if (data.features && data.features.length > 0) {
                    map.fitBounds(lineLayer.getBounds().isValid() ? lineLayer.getBounds() : markersClusterGroup.getBounds());
                }
            })
            .catch(error => {
                console.error('Fehler:', error);
                document.getElementById('map').innerHTML = `
                    <div style="padding: 30px; background: #fff3f3; color: #a94442; font-family: sans-serif; border: 2px solid #ebccd1; margin: 20px; border-radius: 4px;">
                        <h2 style="margin-top: 0;">⚠️ Karte konnte nicht geladen werden</h2>
                        <p><strong>Details:</strong> ${error.message}</p>
                    </div>`;
            });
    </script>
</body>
</html>
