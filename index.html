<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HistoSwiss Interaktive Karte</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- NEU: Leaflet MarkerCluster CSS (Für die Punkt-Zusammenfassung) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .poi-popup img {
            max-width: 260px;
            height: auto;
            border-radius: 6px;
            margin-bottom: 8px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .poi-popup h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            color: #111;
        }
        .poi-popup p {
            margin: 4px 0;
            font-size: 13px;
            color: #444;
            line-height: 1.4;
        }
        .poi-link {
            display: inline-block;
            margin-top: 6px;
            color: #0078A8;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .poi-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- NEU: Leaflet MarkerCluster JavaScript -->
    <script src="https://unpkg.com"></script>

    <script>
        // 1. Karte initialisieren mit Canvas-Modus für maximale Performance
        const map = L.map('map', {
            preferCanvas: true
        }).setView([46.8182, 8.2275], 8);

        // 2. Hintergrundkarte
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap-Mitwirkende'
        }).addTo(map);

        const geojsonUrl = 'histoswiss_route_walking.geojson'; 

        // 3. Cluster-Gruppe erstellen
        const markersClusterGroup = L.markerClusterGroup({
            chunkedLoading: true // Lädt die 20.000 Punkte in kleinen, unmerkbaren Portionen, damit die Seite nicht einfriert
        });

        // 4. Daten laden mit detaillierter Fehleranzeige auf dem Bildschirm
        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP-Fehler ${response.status}: Die Datei "${geojsonUrl}" wurde nicht gefunden. Prüfen Sie die Groß-/Kleinschreibung im GitHub-Repository!`);
                }
                return response.json();
            })
            .then(data => {
                const lineLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        return feature.geometry.type === 'LineString';
                    },
                    style: function(feature) {
                        return {
                            color: feature.properties.stroke || '#0000ff',
                            weight: feature.properties['stroke-width'] || 4,
                            opacity: 0.8
                        };
                    }
                }).addTo(map);

                const pointsLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        return feature.geometry.type === 'Point';
                    },
                    onEachFeature: function(feature, layer) {
                        const props = feature.properties;
                        let popupContent = `<div class="poi-popup">`;
                        if (props.image_url) {
                            popupContent += `<img src="${props.image_url}" alt="POI Bild">`;
                        }
                        popupContent += `<h3>${props.name || 'Unbenannter Ort'}</h3>`;
                        if (props.poi) {
                            popupContent += `<p><strong>Kategorie:</strong> ${props.poi}</p>`;
                        }
                        popupContent += `<p><strong>Distanz zur KFR:</strong> ${props.distanz_kfr || 'Keine Angabe'}</p>`;
                        if (props.target_url) {
                            popupContent += `<a class="poi-link" href="${props.target_url}" target="_blank">Zur Quelle (Histopics) →</a>`;
                        }
                        popupContent += `</div>`;
                        layer.bindPopup(popupContent, { maxWidth: 280 });
                    }
                });

                markersClusterGroup.addLayer(pointsLayer);
                map.addLayer(markersClusterGroup);

                if (data.features && data.features.length > 0) {
                    map.fitBounds(lineLayer.getBounds().isValid() ? lineLayer.getBounds() : markersClusterGroup.getBounds());
                }
            })
            .catch(error => {
                console.error('Fehler:', error);
                // Schreibt den Fehler direkt fett und rot auf die Webseite
                document.getElementById('map').innerHTML = `
                    <div style="padding: 30px; background: #fff3f3; color: #a94442; font-family: sans-serif; border: 2px solid #ebccd1; margin: 20px; border-radius: 4px;">
                        <h2 style="margin-top: 0;">⚠️ Karte konnte nicht geladen werden</h2>
                        <p><strong>Details:</strong> ${error.message}</p>
                        <p>💡 <em>Hinweis: Wenn dort "HTTP-Fehler 404" steht, stimmt der Dateiname in Ihrer index.html nicht exakt mit dem Namen der Datei auf GitHub überein.</em></p>
                    </div>`;
            });
    </script>
</body>
</html>
