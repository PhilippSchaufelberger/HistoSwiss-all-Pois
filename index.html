<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HistoSwiss Interaktive Karte</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .poi-popup img {
            max-width: 260px;
            height: auto;
            border-radius: 6px;
            margin-bottom: 8px;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .poi-popup h3 {
            margin: 0 0 6px 0;
            font-size: 15px;
            color: #111;
        }
        .poi-popup p {
            margin: 4px 0;
            font-size: 13px;
            color: #444;
            line-height: 1.4;
        }
        .poi-link {
            display: inline-block;
            margin-top: 6px;
            color: #0078A8;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .poi-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // 1. Karte initialisieren
        const map = L.map('map').setView([46.8182, 8.2275], 8);

        // 2. Hintergrundkarte
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap-Mitwirkende'
        }).addTo(map);

        // 3. DATEINAME PRÜFEN: 
        // Falls Ihre Datei im Repository anders heisst (z.B. "histoswiss_pois.geojson"), 
        // passen Sie diesen Namen hier exakt an!
        const geojsonUrl = 'histoswiss_route_walking.geojson'; 

        // 4. Daten laden
        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Datei nicht gefunden. Prüfen Sie den Dateinamen in Zeile 56!');
                }
                return response.json();
            })
            .then(data => {
                const geojsonLayer = L.geoJSON(data, {
                    style: function(feature) {
                        if (feature.geometry.type === 'LineString') {
                            return {
                                color: feature.properties.stroke || '#0000ff',
                                weight: feature.properties['stroke-width'] || 4,
                                opacity: 0.8
                            };
                        }
                    },
                    onEachFeature: function(feature, layer) {
                        if (feature.geometry.type === 'Point') {
                            const props = feature.properties;
                            let popupContent = `<div class="poi-popup">`;
                            
                            if (props.image_url) {
                                popupContent += `<img src="${props.image_url}" alt="POI Bild">`;
                            }
                            
                            popupContent += `<h3>${props.name || 'Unbenannter Ort'}</h3>`;
                            
                            if (props.poi) {
                                popupContent += `<p><strong>Kategorie:</strong> ${props.poi}</p>`;
                            }
                            
                            popupContent += `<p><strong>Distanz zur KFR:</strong> ${props.distanz_kfr || 'Keine Angabe'}</p>`;
                            
                            if (props.target_url) {
                                popupContent += `<a class="poi-link" href="${props.target_url}" target="_blank">Zur Quelle (Histopics) →</a>`;
                            }
                            
                            popupContent += `</div>`;
                            layer.bindPopup(popupContent, { maxWidth: 280 });
                        }
                    }
                }).addTo(map);

                // FEHLER BEHOBEN: Das leere "{ padding: }" wurde entfernt
                if (data.features && data.features.length > 0) {
                    map.fitBounds(geojsonLayer.getBounds()); 
                }
            })
            .catch(error => {
                console.error('Fehler:', error);
                document.getElementById('map').innerHTML = `<div style="padding:20px;color:red;font-weight:bold;">Fehler beim Laden der Daten: ${error.message}</div>`;
            });
    </script>
</body>
</html>
